name: NPS 13F Portfolio Diff

on:
  workflow_dispatch:
    inputs:
      top_n:
        description: "리포트에 표시할 Top N"
        required: false
        default: "30"
      query_size:
        description: "최근 13F 검색 개수. 수정 보고 대비용"
        required: false
        default: "8"
      include_options:
        description: "13F 옵션 포지션 포함 여부 true/false"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  nps-13f-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NPS 13F diff
        env:
          SEC_API_KEY: ${{ secrets.SEC_API_KEY }}
          NPS_CIK: "1608046"
          TOP_N: ${{ github.event.inputs.top_n }}
          QUERY_SIZE: ${{ github.event.inputs.query_size }}
          INCLUDE_OPTIONS: ${{ github.event.inputs.include_options }}
          OUT_DIR: "out"
        run: |
          python scripts/nps_13f_diff.py

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nps-13f-report
          path: out/
